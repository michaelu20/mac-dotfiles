# ===== Prefix =====
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# ===== Terminal / Colors =====
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /opt/homebrew/bin/nu

# ===== Plugins =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
#set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ===== Catppuccin (v2 API) =====
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #{pane_current_command}"
set -g @catppuccin_window_text " #{pane_current_command}"

# ===== Status Bar =====
set -g status-position top
set -g status-justify "absolute-centre"
set -g status-interval 5
set -g status-bg default
set -g status-style "bg=default"

# Load catppuccin modules BEFORE setting status-left/right
run '~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{?window_zoomed_flag,#[fg=#1e1e2e bg=#f38ba8 bold]  󰊓 ZOOM  #[fg=default bg=default none],}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text "%H:%M"

# ===== Pane borders =====
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-lines single

# Change border color red when zoomed
set-hook -g after-resize-pane 'if-shell "[ #{window_zoomed_flag} = 1 ]" "set -w pane-active-border-style fg=#f38ba8" "set -w pane-active-border-style fg=#89b4fa"'

# ===== General UX =====
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g mouse on
set -g history-limit 50000
set -g focus-events on

# ===== Navigation =====
#bind -n C-h select-pane -L
#bind -n C-j select-pane -D
#bind -n C-k select-pane -U
#bind -n C-l select-pane -R

# ===== Splits (open in current path) =====
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ===== Resizing =====
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ===== Resurrect / Continuum =====
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# ===== Reload =====
bind r source-file ~/.tmux.conf \; display-message "󰑓 Reloaded!"

# ===== TPM (KEEP LAST) =====
run '~/.tmux/plugins/tpm/tpm'


# ===== Copy Mode =====
setw -g mode-keys vi
set -g set-clipboard on

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Mouse drag to select also copies to system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
